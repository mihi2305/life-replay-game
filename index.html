<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>人生リプレイ：あの日の選択</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23fff0c7'/%3E%3Cpath d='M12 40c12-14 26 10 40-8v16H12z' fill='%233f9b77'/%3E%3Ccircle cx='44' cy='18' r='8' fill='%23ffd36b'/%3E%3Cpath d='M20 34h18v14H20z' fill='%23ffffff'/%3E%3Cpath d='M18 34l11-9 11 9z' fill='%23d66755'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar">
        <div>
          <p class="eyebrow">人生リプレイ</p>
          <h1>あの日の選択</h1>
        </div>
        <div class="turn-badge">
          <span id="stageName">小学校</span>
          <strong id="turnLabel">1 / 45</strong>
        </div>
      </section>

      <section id="topStatusBar" class="top-status-bar" aria-label="進行状況"></section>

      <section class="game-grid">
        <aside class="panel status-panel">
          <div class="month-card">
            <span id="yearLabel">小1 4月</span>
            <strong id="chapterTitle">入学式</strong>
          </div>
          <div class="stats" id="stats"></div>
          <div class="sub-menu-bar">
            <button class="sub-menu-button" id="logButton" type="button">ログ</button>
            <button class="sub-menu-button" id="catalogButton" type="button">図鑑</button>
            <button class="sub-menu-button" id="albumButton" type="button">アルバム</button>
            <button class="sub-menu-button" id="settingsButton" type="button">設定</button>
          </div>
        </aside>

        <section class="panel play-panel">
          <div id="stageView" class="stage-view school-elementary">
            <div class="stage-sky" aria-hidden="true"></div>
            <div class="character-stage">
              <div id="characterAvatar" class="character-sprite character-placeholder" aria-hidden="true">🙂</div>
              <div>
                <p class="character-name-label">主人公</p>
                <strong id="characterName">あなた</strong>
              </div>
            </div>
          </div>
          <div id="message" class="message"></div>
          <div id="chanceBox" class="chance-box hidden"></div>
          <div id="choices" class="choice-list"></div>
          <div class="action-footer main-tool-grid">
            <button id="shopButton" class="tool-action-button" type="button"><span>🛒</span>ショップ</button>
            <button id="inventoryButton" class="tool-action-button" type="button"><span>🎒</span>持ち物</button>
            <button id="resetButton" class="tool-action-button" type="button"><span>🔁</span>もう一度</button>
          </div>
        </section>

        <aside class="panel side-panel">
          <h2>イベントログ</h2>
          <div id="logList" class="log-list"></div>
          <h2>獲得カード</h2>
          <div id="latestCards" class="mini-cards"></div>
        </aside>
      </section>
    </main>

    <div class="modal-backdrop hidden" id="modalBackdrop">
      <section class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <button class="icon-button" id="closeModal" type="button" aria-label="閉じる">×</button>
        <h2 id="modalTitle"></h2>
        <div id="modalBody"></div>
      </section>
    </div>

    <script>
      window.LIFE_REPLAY_SUPABASE_CONFIG = {
        url: "",
        anonKey: ""
      };
    </script>
    <script src="supabaseConfig.js"></script>
    <script src="supabaseClient.js"></script>
    <script src="game.js"></script>
  </body>
</html>
